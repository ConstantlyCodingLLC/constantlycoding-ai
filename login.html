<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center h-screen bg-gray-100">

<div class="bg-white p-6 rounded shadow w-96">
  <input id="email" class="w-full p-2 border mb-2" placeholder="Email">
  <input id="password" class="w-full p-2 border mb-2" placeholder="Password" type="password">

  <button onclick="login()" class="bg-blue-600 text-white w-full p-2">Login</button>
</div>

<script type="module">
import { supabase } from "./supabase.js";

window.login = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) return alert(error.message);

  location.href = "chat.html";
};
</script>

</body>
</html>
