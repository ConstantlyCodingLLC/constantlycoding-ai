<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white flex items-center justify-center h-screen">

<div class="bg-gray-800 p-6 rounded w-96">

  <h1 class="text-xl mb-4">Login</h1>

  <input id="email" class="w-full p-2 mb-2 bg-gray-700 rounded" placeholder="Email">
  <input id="password" type="password" class="w-full p-2 mb-4 bg-gray-700 rounded" placeholder="Password">

  <button id="loginBtn" class="w-full bg-blue-500 p-2 rounded">
    Login
  </button>

  <div class="flex justify-between mt-3 text-sm">
    <a href="signup.html" class="text-blue-400">Sign Up</a>
    <a href="forgotpassword.html" class="text-gray-400">Forgot?</a>
  </div>

</div>

<script type="module">
import { supabase } from "./supabase.js";

const btn = document.getElementById("loginBtn");

btn.onclick = async () => {
  btn.disabled = true;

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert(error.message);
    btn.disabled = false;
    return;
  }

  window.location.href = "chat.html";
};
</script>

</body>
</html>
