<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Constantly Coding AI</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #0b1120;
    }
  </style>
</head>

<body class="text-white overflow-hidden">

<!-- APP WRAPPER -->
<div class="flex h-screen">

  <!-- MOBILE OVERLAY -->
  <div id="overlay" class="hidden fixed inset-0 bg-black/60 z-40"></div>

  <!-- SIDEBAR -->
  <aside id="sidebar"
    class="fixed lg:static z-50 w-72 h-full bg-slate-900 border-r border-slate-800
           transform -translate-x-full lg:translate-x-0 transition-transform duration-300">

    <div class="p-4 text-xl font-bold border-b border-slate-800">
      Constantly Coding AI
    </div>

    <div class="p-3 space-y-2">
      <button class="w-full text-left p-2 rounded-lg bg-slate-800 hover:bg-slate-700">
        + New Chat
      </button>

      <div class="text-sm text-slate-400 mt-4">Recent</div>

      <div class="space-y-1 text-sm">
        <div class="p-2 hover:bg-slate-800 rounded-lg cursor-pointer">Ticket Support AI</div>
        <div class="p-2 hover:bg-slate-800 rounded-lg cursor-pointer">Inventory Help</div>
        <div class="p-2 hover:bg-slate-800 rounded-lg cursor-pointer">Work Orders</div>
      </div>
    </div>
  </aside>

  <!-- MAIN AREA -->
  <div class="flex flex-col flex-1">

    <!-- TOP BAR -->
    <header class="h-14 flex items-center px-4 border-b border-slate-800">
      <button onclick="toggleSidebar()" class="lg:hidden text-white text-2xl">
        ☰
      </button>

      <div class="ml-4 font-semibold">
        AI Assistant
      </div>
    </header>

    <!-- CHAT AREA -->
    <main class="flex-1 overflow-y-auto p-4">

      <div class="max-w-3xl mx-auto space-y-4">

        <!-- AI MESSAGE -->
        <div class="bg-slate-800/60 border border-white/10 p-4 rounded-2xl">
          👋 Hello! I’m your AI assistant. How can I help?
        </div>

        <!-- USER MESSAGE -->
        <div class="bg-blue-600/20 border border-blue-500/30 p-4 rounded-2xl ml-auto w-fit">
          Create a ticket for internet outage
        </div>

        <!-- AI RESPONSE -->
        <div class="bg-slate-800/60 border border-white/10 p-4 rounded-2xl">
          ✔ Ticket created successfully for internet outage.
        </div>

      </div>
    </main>

    <!-- INPUT BAR -->
    <footer class="border-t border-slate-800 p-3 bg-slate-950">

      <div class="max-w-3xl mx-auto flex items-center gap-2 bg-slate-900 p-3 rounded-2xl border border-slate-700">

        <button class="text-xl">📎</button>

        <textarea
          class="flex-1 bg-transparent outline-none resize-none text-white"
          rows="1"
          placeholder="Ask your AI assistant...">
        </textarea>

        <button class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-xl">
          Send
        </button>

      </div>

    </footer>

  </div>
</div>

<!-- SCRIPT -->
<script>
function toggleSidebar() {
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");

  const isOpen = sidebar.classList.contains("translate-x-0");

  if (isOpen) {
    sidebar.classList.remove("translate-x-0");
    sidebar.classList.add("-translate-x-full");
    overlay.classList.add("hidden");
  } else {
    sidebar.classList.remove("-translate-x-full");
    sidebar.classList.add("translate-x-0");
    overlay.classList.remove("hidden");
  }
}

document.getElementById("overlay").addEventListener("click", toggleSidebar);
</script>

</body>
</html>
