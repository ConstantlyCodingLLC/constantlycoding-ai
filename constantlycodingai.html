<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Business Assistant</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f172a;
      color: white;
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 250px;
      background: #111827;
      padding: 20px;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .chat {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .inputBar {
      display: flex;
      padding: 15px;
      background: #1f2937;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 5px;
    }

    button {
      margin-left: 10px;
      padding: 10px 15px;
      background: #3b82f6;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .msg {
      margin-bottom: 10px;
    }

    .user { color: #60a5fa; }
    .ai { color: #34d399; }
  </style>
</head>
<body>

  <div class="sidebar">
    <h2>AI Assistant</h2>
    <p>Business System</p>
    <hr>
    <p>• Dashboard</p>
    <p>• Tickets</p>
    <p>• Work Orders</p>
    <p>• AI Chat</p>
  </div>

  <div class="main">
    <div id="chat" class="chat"></div>

    <div class="inputBar">
      <input id="input" placeholder="Ask AI to create tickets, invoices, etc..." />
      <button onclick="send()">Send</button>
    </div>
  </div>

<script>
async function send() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const message = input.value;
  if (!message) return;

  chat.innerHTML += `<div class="msg user">You: ${message}</div>`;

  const res = await fetch("https://YOUR-API-ENDPOINT.com/ai", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message })
  });

  const data = await res.json();

  chat.innerHTML += `<div class="msg ai">AI: ${data.response}</div>`;
  input.value = "";
}
</script>

</body>
</html>
