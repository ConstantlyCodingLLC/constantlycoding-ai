<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white flex flex-col h-screen">

<div class="p-4 bg-gray-800">AI Chat SaaS</div>

<div id="chatBox" class="flex-1 overflow-y-auto p-4"></div>

<div class="p-2 flex gap-2 bg-gray-800">
  <input id="message" class="flex-1 p-2 text-black">
  <button onclick="sendMessage()" class="bg-blue-600 px-4">Send</button>
</div>

<script type="module">
import { supabase } from './supabase.js';

const chatBox = document.getElementById("chatBox");

async function loadMessages() {
  const { data } = await supabase
    .from("messages")
    .select("*")
    .order("created_at", { ascending: true });

  chatBox.innerHTML = "";

  data.forEach(m => {
    const div = document.createElement("div");
    div.className = "p-2 bg-gray-700 my-1 rounded";
    div.textContent = m.role + ": " + m.message;
    chatBox.appendChild(div);
  });
}

window.sendMessage = async () => {
  const text = message.value;
  if (!text) return;

  const user = await supabase.auth.getUser();

  // Save user message
  await supabase.from("messages").insert([
    { user_id: user.data.user?.id || null, message: text, role: "user" }
  ]);

  message.value = "";

  // Call AI backend
  const res = await fetch("/api/chat", {
    method: "POST",
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();

  await supabase.from("messages").insert([
    { user_id: null, message: data.reply, role: "ai" }
  ]);

  loadMessages();
};

loadMessages();
</script>

</body>
</html><!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white flex flex-col h-screen">

  <div class="p-4 bg-gray-800 text-center font-bold">
    AI Chat Room (Guest Enabled)
  </div>

  <div id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-2"></div>

  <div class="p-3 bg-gray-800 flex gap-2">
    <input id="message" type="text"
      class="flex-1 p-2 rounded text-black"
      placeholder="Type message...">

    <button onclick="sendMessage()"
      class="bg-blue-600 px-4 py-2 rounded">
      Send
    </button>
  </div>

  <script src="app.js"></script>
</body>
</html>
