<!DOCTYPE html>
<html>
<head>
  <title>AI Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #0b1120;
    }

    .logo-watermark {
      position: fixed;
      inset: 0;
      background: url("https://upload.wikimedia.org/wikipedia/commons/6/6a/JavaScript-logo.png") center/420px no-repeat;
      opacity: 0.04;
      pointer-events: none;
    }

    @media (min-width: 768px) {
      .chat-container {
        max-width: 900px;
        margin: auto;
      }
    }
  </style>
</head>

<body class="text-white">

<div class="logo-watermark"></div>

<div class="flex flex-col h-screen chat-container">

  <!-- HEADER -->
  <div class="p-4 flex justify-between items-center border-b border-white/10">
    <div class="font-bold text-lg">AI Pro Assistant</div>

    <button onclick="logout()"
      class="text-sm bg-white/10 px-3 py-1 rounded hover:bg-white/20">
      Logout
    </button>
  </div>

  <!-- CHAT -->
  <div id="chatBox"
    class="flex-1 overflow-y-auto p-4 space-y-3">

    <div class="bg-white/10 p-3 rounded-xl w-fit">
      👋 Ask me anything
    </div>

  </div>

  <!-- INPUT -->
  <div class="p-3 border-t border-white/10 flex gap-2">

    <input id="input"
      class="flex-1 p-3 rounded-xl bg-black/40 outline-none"
      placeholder="Message..." />

    <button onclick="sendMessage()"
      class="bg-blue-600 px-4 rounded-xl hover:bg-blue-700">
      Send
    </button>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>
<script src="app.js"></script>

</body>
</html>
