<!DOCTYPE html>
<html>
<head>
  <title>AI Pro Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white flex flex-col h-screen">

<!-- TOP BAR -->
<div class="bg-gray-800 p-3 flex justify-between items-center">
  <div class="font-bold">AI Pro Chat</div>

  <div class="flex gap-2">
    <button onclick="goLogin()" class="bg-blue-600 px-3 py-1 rounded text-sm">
      Login
    </button>
    <button onclick="clearChat()" class="bg-red-500 px-3 py-1 rounded text-sm">
      Clear
    </button>
  </div>
</div>

<!-- CHAT BOX -->
<div id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-2"></div>

<!-- INPUT -->
<div class="p-3 bg-gray-800 flex gap-2">
  <input id="message"
    class="flex-1 p-2 rounded text-black"
    placeholder="Type message...">

  <button onclick="sendMessage()"
    class="bg-blue-600 px-4 rounded">
    Send
  </button>
</div>

<script type="module">
import { supabase } from "./supabase.js";

/* -------------------------
   USER (GUEST BY DEFAULT)
--------------------------*/
let user = localStorage.getItem("user");

if (!user) {
  user = "Guest_" + Math.floor(Math.random() * 9999);
  localStorage.setItem("user", user);
}

/* -------------------------
   LOAD MESSAGES
--------------------------*/
async function loadMessages() {
  const box = document.getElementById("chatBox");

  const { data } = await supabase
    .from("messages")
    .select("*")
    .order("created_at", { ascending: true });

  box.innerHTML = "";

  data.forEach(m => {
    const div = document.createElement("div");

    div.className =
      m.role === "ai"
        ? "bg-green-700 p-2 rounded"
        : "bg-gray-700 p-2 rounded";

    div.textContent = m.role + ": " + m.message;

    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
}

/* -------------------------
   SEND MESSAGE + AI
--------------------------*/
window.sendMessage = async () => {
  const input = document.getElementById("message");
  const text = input.value;
  if (!text) return;

  input.value = "";

  // SAVE USER MESSAGE
  await supabase.from("messages").insert([
    {
      message: text,
      role: "user"
    }
  ]);

  loadMessages();

  // CALL AI BACKEND
  const res = await fetch("/api/chat", {
    method: "POST",
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();

  // SAVE AI RESPONSE
  await supabase.from("messages").insert([
    {
      message: data.reply,
      role: "ai"
    }
  ]);

  loadMessages();
};

/* -------------------------
   NAV FUNCTIONS
--------------------------*/
window.goLogin = () => {
  window.location.href = "login.html";
};

window.clearChat = () => {
  localStorage.removeItem("msgs");
  location.reload();
};

/* -------------------------
   INIT
--------------------------*/
loadMessages();

</script>

</body>
</html><!DOCTYPE html>
