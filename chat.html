<!DOCTYPE html>
<html>
<head>
  <title>AI Chat SaaS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white flex flex-col h-screen">

<div class="bg-gray-800 p-3 flex justify-between">
  <div class="font-bold">AI Chat</div>
  <button onclick="location.href='login.html'" class="bg-blue-600 px-3 py-1 rounded">
    Login
  </button>
</div>

<div id="chatBox" class="flex-1 overflow-y-auto p-4"></div>

<div class="p-3 bg-gray-800 flex gap-2">
  <input id="message" class="flex-1 p-2 text-black rounded" placeholder="Type message...">
  <button onclick="sendMessage()" class="bg-blue-600 px-4 rounded">Send</button>
</div>

<script type="module">
import { supabase } from "./supabase.js";

async function loadMessages() {
  const box = document.getElementById("chatBox");

  const { data } = await supabase
    .from("messages")
    .select("*")
    .order("created_at", { ascending: true });

  box.innerHTML = "";

  data.forEach(m => {
    const div = document.createElement("div");
    div.className = "p-2 my-1 rounded " + (m.role === "ai" ? "bg-green-700" : "bg-gray-700");
    div.textContent = m.role + ": " + m.message;
    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
}

window.sendMessage = async () => {
  const input = document.getElementById("message");
  const text = input.value;
  if (!text) return;

  input.value = "";

  await supabase.from("messages").insert([{ message: text, role: "user" }]);

  const res = await fetch("/api/chat", {
    method: "POST",
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();

  await supabase.from("messages").insert([{ message: data.reply, role: "ai" }]);

  loadMessages();
};

loadMessages();
</script>

</body>
</html>
