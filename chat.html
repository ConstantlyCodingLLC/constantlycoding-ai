<!DOCTYPE html>
<html>
<head>
  <title>AI Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #111827, #0b1120);
      color: white;
      overflow: hidden;
    }

    .chat {
      max-width: 800px;
      margin: auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .msg {
      padding: 10px;
      margin: 6px 0;
      border-radius: 12px;
      max-width: 80%;
    }

    .user { background: rgba(59,130,246,0.2); margin-left: auto; }
    .ai { background: rgba(255,255,255,0.08); }
  </style>
</head>

<body>

<div class="chat">

  <div class="p-3 border-b border-white/10">
    AI Assistant
  </div>

  <div id="messages" class="messages"></div>

  <div class="p-3 border-t border-white/10 flex gap-2">
    <input id="input" class="flex-1 p-3 rounded bg-black/40" placeholder="Message...">
    <button onclick="send()" class="bg-blue-600 px-4 rounded">Send</button>
  </div>

</div>

<script src="supabase.js"></script>
<script src="app.js"></script>

</body>
</html>
