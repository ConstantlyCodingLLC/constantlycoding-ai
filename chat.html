<!DOCTYPE html>
<html>
<head>
  <title>AI Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0b1120] text-white">

<div class="flex flex-col h-screen">

  <!-- TOP BAR -->
  <div class="flex justify-between p-3 border-b border-white/10">
    <div class="font-bold">AI Pro</div>

    <button onclick="logout()" class="text-sm bg-white/10 px-3 rounded">
      Logout
    </button>
  </div>

  <!-- CHAT -->
  <div id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-3"></div>

  <!-- INPUT -->
  <div class="p-3 border-t border-white/10 flex gap-2">

    <input id="input"
      class="flex-1 p-3 rounded bg-black/40"
      placeholder="Message AI..."
    />

    <button onclick="sendMessage()"
      class="bg-blue-600 px-4 rounded">
      Send
    </button>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>
<script src="app.js"></script>

</body>
</html>
