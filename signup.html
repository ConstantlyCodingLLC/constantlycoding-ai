<!DOCTYPE html>
<html>
<head>
  <title>Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 flex items-center justify-center h-screen">

<div class="bg-gray-800 p-8 rounded-xl w-96 text-white shadow-xl">
  <h1 class="text-2xl mb-6 text-center font-bold">Create Account</h1>

  <input id="email" class="w-full p-2 mb-3 rounded bg-gray-700" placeholder="Email">
  <input id="password" type="password" class="w-full p-2 mb-4 rounded bg-gray-700" placeholder="Password">

  <button onclick="signup()" class="w-full bg-green-500 p-2 rounded hover:bg-green-600">
    Create Account
  </button>

  <div class="mt-4 text-center text-sm">
    <a href="index.html" class="text-blue-400">Back to Login</a>
  </div>
</div>

<script>
function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  localStorage.setItem("user", JSON.stringify({ email, password }));

  alert("Account created!");
  window.location.href = "index.html";
}
</script>

</body>
</html><!DOCTYPE html>
<html>
<head>
  <title>Signup</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center h-screen bg-gray-100">

<div class="bg-white p-6 rounded shadow w-96">
  <input id="email" class="w-full p-2 border mb-2" placeholder="Email">
  <input id="password" class="w-full p-2 border mb-2" placeholder="Password" type="password">

  <button onclick="signup()" class="bg-green-600 text-white w-full p-2">Signup</button>
</div>

<script type="module">
import { supabase } from "./supabase.js";

window.signup = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({ email, password });

  if (error) return alert(error.message);

  alert("Check email to confirm");
  location.href = "login.html";
};
</script>

</body>
</html>
