<!DOCTYPE html>
<html>
<head>
  <title>Sign Up</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- MUST LOAD SUPABASE FIRST -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body class="bg-[#0b1120] text-white flex items-center justify-center h-screen">

<div class="w-full max-w-sm p-6 bg-white/5 rounded-xl">

  <h1 class="text-xl mb-4">Create Account</h1>

  <input id="email" class="w-full p-3 mb-2 bg-black/40 rounded" placeholder="Email">
  <input id="password" type="password" class="w-full p-3 mb-4 bg-black/40 rounded" placeholder="Password">

  <button onclick="signup()" class="w-full bg-blue-600 p-3 rounded">
    Create Account
  </button>

  <button onclick="goLogin()" class="w-full mt-2 bg-white/10 p-3 rounded">
    Back to Login
  </button>

</div>

<script src="supabase.js"></script>
<script src="auth.js"></script>

</body>
</html>
