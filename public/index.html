<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Constantly Coding AI</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #0b1120;
    }
  </style>
</head>

<body class="text-white overflow-hidden">

<div class="flex h-screen">

  <!-- SIDEBAR -->
  <aside class="w-72 hidden lg:flex flex-col bg-slate-900 border-r border-slate-800">
    <div class="p-4 text-xl font-bold border-b border-slate-800">
      Constantly Coding AI
    </div>

    <button class="m-3 p-2 bg-blue-600 rounded-lg hover:bg-blue-700">
      + New Chat
    </button>

    <div class="p-3 text-sm text-slate-400">
      Conversations
    </div>

    <div class="p-2 space-y-2 text-sm">
      <div class="p-2 rounded-lg hover:bg-slate-800 cursor-pointer">
        AI Assistant Chat
      </div>
      <div class="p-2 rounded-lg hover:bg-slate-800 cursor-pointer">
        Ticket System Help
      </div>
      <div class="p-2 rounded-lg hover:bg-slate-800 cursor-pointer">
        Inventory AI
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="flex flex-col flex-1">

    <!-- TOP BAR -->
    <header class="h-14 flex items-center px-4 border-b border-slate-800">
      <div class="font-semibold">AI Assistant</div>
    </header>

    <!-- CHAT AREA -->
    <main id="chat" class="flex-1 overflow-y-auto p-4 space-y-4">

      <div class="bg-slate-800 p-3 rounded-2xl w-fit">
        👋 Hello! I’m your AI assistant. Ask me anything.
      </div>

    </main>

    <!-- INPUT -->
    <footer class="p-3 border-t border-slate-800">

      <div class="flex gap-2 max-w-3xl mx-auto">

        <input
          id="msg"
          class="flex-1 p-3 bg-slate-900 rounded-xl outline-none"
          placeholder="Ask something..."
        />

        <button
          onclick="sendMessage()"
          class="bg-blue-600 hover:bg-blue-700 px-5 rounded-xl"
        >
          Send
        </button>

      </div>

    </footer>

  </div>
</div>

<script>
async function sendMessage() {
  const input = document.getElementById("msg");
  const chat = document.getElementById("chat");

  const text = input.value.trim();
  if (!text) return;

  // USER MESSAGE
  chat.innerHTML += `
    <div class="bg-blue-600/20 p-3 rounded-2xl ml-auto w-fit">
      ${text}
    </div>
  `;

  input.value = "";

  // AI PLACEHOLDER (replace with backend later)
  chat.innerHTML += `
    <div class="bg-slate-800 p-3 rounded-2xl w-fit">
      Thinking...
    </div>
  `;

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
