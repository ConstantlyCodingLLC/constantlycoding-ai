<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Pro Assistant</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: var(--bg, #0b1120);
      transition: 0.3s ease;
    }

    .bubble {
      animation: fadeIn 0.15s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body class="text-white">

<div class="flex flex-col h-screen">

  <!-- TOP BAR (mobile friendly) -->
  <div class="flex items-center justify-between p-3 border-b border-white/10">
    <div class="font-bold">AI Pro</div>

    <button onclick="openSettings()" class="text-sm bg-white/10 px-3 py-1 rounded-lg">
      Theme
    </button>
  </div>

  <!-- CHAT AREA -->
  <div id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-3">

    <div class="bg-white/10 p-3 rounded-xl w-fit bubble">
      👋 Welcome to AI Pro
    </div>

  </div>

  <!-- INPUT -->
  <div class="p-3 border-t border-white/10 flex gap-2">

    <input id="input"
      class="flex-1 p-3 rounded-xl bg-black/40 outline-none"
      placeholder="Message AI..."
    />

    <button onclick="sendMessage()"
      class="bg-blue-600 px-4 rounded-xl">
      Send
    </button>

  </div>
</div>

<!-- SETTINGS MODAL -->
<div id="settings" class="hidden fixed inset-0 bg-black/70 p-6">

  <div class="bg-slate-900 p-4 rounded-xl max-w-md mx-auto mt-20">

    <h2 class="text-lg font-bold mb-3">Customize Theme</h2>

    <button onclick="setTheme('#0b1120')" class="w-full p-2 bg-slate-800 rounded mb-2">
      Default Dark
    </button>

    <button onclick="setTheme('#111827')" class="w-full p-2 bg-slate-800 rounded mb-2">
      Deep Gray
    </button>

    <button onclick="setTheme('#0f172a')" class="w-full p-2 bg-slate-800 rounded mb-2">
      Navy Pro
    </button>

    <button onclick="closeSettings()" class="mt-3 text-sm text-gray-400">
      Close
    </button>

  </div>
</div>

<script src="app.js"></script>

</body>
</html>
