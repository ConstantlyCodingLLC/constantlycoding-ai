<!DOCTYPE html>
<html>
<head>
  <title>Welcome Back!</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: radial-gradient(circle at top, #1e293b, #0b1120);
      overflow: hidden;
    }

    .logo-bg {
      position: absolute;
      inset: 0;
      background: url("https://upload.wikimedia.org/wikipedia/commons/6/6a/JavaScript-logo.png") center/300px no-repeat;
      opacity: 0.05;
      filter: blur(1px);
    }
  </style>
</head>

<body class="text-white flex items-center justify-center h-screen">

<div class="logo-bg"></div>

<div class="relative w-full max-w-md p-6 bg-white/5 rounded-2xl backdrop-blur-lg">

  <h1 class="text-2xl font-bold text-center mb-6">
    AI Pro Assistant
  </h1>

  <input id="email"
    class="w-full p-3 mb-3 rounded bg-black/40"
    placeholder="Email" />

  <input id="password" type="password"
    class="w-full p-3 mb-5 rounded bg-black/40"
    placeholder="Password" />

  <button onclick="login()"
    class="w-full bg-blue-600 p-3 rounded mb-2 hover:bg-blue-700">
    Login
  </button>

  <button onclick="signup()"
    class="w-full bg-white/10 p-3 rounded hover:bg-white/20">
    Create Account
  </button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>
<script src="auth.js"></script>

</body>
</html>
